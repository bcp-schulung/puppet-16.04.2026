<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joke Machine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.4rem;
      color: #e94560;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .joke-box {
      background: #0f3460;
      border-radius: 10px;
      padding: 1.5rem;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    #setup {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    #punchline {
      font-size: 1.05rem;
      color: #e94560;
      font-style: italic;
      display: none;
    }

    #placeholder {
      font-size: 1rem;
      color: #555;
    }

    #error-msg {
      font-size: 0.95rem;
      color: #ff6b6b;
      display: none;
    }

    button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover  { background: #c73652; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #555; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid #0f3460;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Joke Machine</h1>
    <p class="subtitle">Powered by Node.js &amp; PostgreSQL</p>

    <div class="joke-box">
      <div class="spinner" id="spinner"></div>
      <p id="placeholder">Press the button to get a joke!</p>
      <p id="setup"></p>
      <p id="punchline"></p>
      <p id="error-msg"></p>
    </div>

    <button id="btn" onclick="fetchJoke()">Tell me a joke</button>
  </div>

  <script>
    // let backendUrl = '';

    // Load backend URL from server config, then enable the button
    //fetch('/config.json')
    //  .then(r => r.json())
    //  .then(cfg => { backendUrl = cfg.backendUrl; })
    //  .catch(() => { backendUrl = 'http://localhost:3001'; });

    async function fetchJoke() {
      const btn        = document.getElementById('btn');
      const spinner    = document.getElementById('spinner');
      const placeholder = document.getElementById('placeholder');
      const setup      = document.getElementById('setup');
      const punchline  = document.getElementById('punchline');
      const errorMsg   = document.getElementById('error-msg');

      // Reset state
      btn.disabled      = true;
      spinner.style.display    = 'block';
      placeholder.style.display = 'none';
      setup.textContent = '';
      punchline.style.display  = 'none';
      punchline.textContent    = '';
      errorMsg.style.display   = 'none';

      try {
        const res = await fetch(`/api/joke`);
        if (!res.ok) throw new Error(`Server responded with ${res.status}`);
        const data = await res.json();

        setup.textContent = data.setup;

        // Reveal the punchline after a short pause for comedic effect
        await delay(900);
        punchline.textContent   = data.punchline;
        punchline.style.display = 'block';
      } catch (err) {
        errorMsg.textContent   = `Could not fetch joke: ${err.message}`;
        errorMsg.style.display = 'block';
      } finally {
        spinner.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Another one!';
      }
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
